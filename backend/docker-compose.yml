services:
  db:
    image: postgres:14.3
    container_name: subsly-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: subsly
    volumes:
      - ./_postgres:/var/lib/postgresql/data
  redis:
    container_name: subsly-redis
    restart: always
    image: redis:8.2.1-alpine
    ports:
      - 6379:6379
    volumes:
      - ./_redis:/data
    depends_on:
      - db
  redis-commander:
    container_name: redis-commander
    env_file:
      - ./src/main/resources/.env
    hostname: redis-commander
    image: ghcr.io/joeferner/redis-commander:latest
    restart: always
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=1234
      - REDIS_USERNAME=default
      - REDIS_ARGS=--requirepass 1234 --protected-mode yes
    depends_on:
      - redis
    ports:
      - "8081:8081"