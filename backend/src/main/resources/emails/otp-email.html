<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Code</title>
</head>

<body style="margin:0;padding:0;background:#18181b;font-family:Inter,Segoe UI,Arial,sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#18181b;padding:40px 0;">
    <tr>
        <td align="center">

            <!-- Card -->
            <table width="480" cellpadding="0" cellspacing="0" border="0"
                   style="background:#27272a;border-radius:12px;padding:40px;border:1px solid #3f3f46;">

                <tr>
                    <td align="center" style="padding-bottom:24px;">
<span style="font-size:22px;font-weight:600;color:#ffffff;">
Subsly
</span>
                    </td>
                </tr>

                <tr>
                    <td align="center" style="padding-bottom:10px;">
                        <h1 style="margin:0;font-size:22px;color:#ffffff;font-weight:600;">
                            Your verification code
                        </h1>
                    </td>
                </tr>

                <tr>
                    <td align="center" style="padding-bottom:25px;">
                        <p style="margin:0;color:#d4d4d8;font-size:14px;line-height:1.6;">
                            Use the following code.
                        </p>
                    </td>
                </tr>

                <tr>
                    <td align="center" style="padding-bottom:30px;">

                        <!-- OTP BOX -->
                        <table cellpadding="0" cellspacing="0">
                            <tr>
                                <td style="
                    font-size:34px;
                    letter-spacing:8px;
                    font-weight:700;
                    color:#ffffff;
                    background:#3f3f46;
                    padding:18px 34px;
                    border-radius:10px;
                    font-family:monospace;
                    border:1px solid #52525b;
                ">
                                    {{OTP_CODE}}
                                </td>
                            </tr>
                        </table>

                    </td>
                </tr>

                <tr>
                    <td align="center" style="padding-bottom:20px;">
                        <p style="margin:0;color:#a1a1aa;font-size:13px;">
                            This code will expire in 5 minutes.
                        </p>
                    </td>
                </tr>

                <tr>
                    <td align="center" style="border-top:1px solid #3f3f46;padding-top:20px;">
                        <p style="margin:0;color:#71717a;font-size:12px;">
                            If you didn't request this code, you can safely=
                            ignore this email.
                        </p>
                    </td>
                </tr>

            </table>
        </td>
    </tr>
</table>

</body>
</html>
